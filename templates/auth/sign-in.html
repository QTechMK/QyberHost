{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="QyberHost sign in page.">
    <meta name="keywords" content="QyberHost login, client login">
    <link rel="icon" href="{% static 'auth/images/favicon.png' %}" type="image/x-icon">
    <link rel="shortcut icon" href="{% static 'auth/images/favicon.png' %}" type="image/x-icon">
    <title>QyberHost - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'auth/css/bootstrap.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'auth/css/fontawesome.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'auth/css/login.css' %}">
</head>
<body>
    <div class="loader-wrapper" id="loader-wrapper">
        <div class="loader"></div>
    </div>
    <section class="page-section login-page">
        <div class="full-width-screen">
            <div class="container-fluid p-0">
                <div class="particles-bg" id="particles-js">
                    <div class="content-detail">
                        <form class="login-form" method="post">
                            {% csrf_token %}
                            <div class="imgcontainer">
                                <img src="{% static 'auth/images/logo-2.png' %}" alt="QyberHost" class="avatar">
                            </div>
                            <div class="input-control">
                                <input type="text" placeholder="Enter Username" name="username" required>
                                <span class="password-field-show">
                                    <input type="password" placeholder="Enter Password" name="password" class="password-field" value="" required>
                                    <span data-toggle=".password-field" class="fa fa-fw fa-eye field-icon toggle-password"></span>
                                </span>
                                <label class="label-container">Remember me
                                    <input type="checkbox" name="remember_me">
                                    <span class="checkmark"></span>
                                </label>
                                <span class="psw"><a href="{% url 'forgot-password' %}" class="forgot-btn">Forgot password?</a></span>
                                <div class="login-btns">
                                    <button type="submit">Login</button>
                                </div>
                                <div class="division-lines">
                                    <p>or login with</p>
                                </div>
                                <div class="login-with-btns">
                                    <button type="button" class="google"><i class="fab fa-google"></i></button>
                                    <button type="button" class="facebook"><i class="fab fa-facebook-f"></i></button>
                                    <button type="button" class="twitter"><i class="fab fa-twitter"></i></button>
                                    <button type="button" class="linkedin"><i class="fab fa-linkedin-in"></i></button>
                                    <span class="already-acc">Not a member? <a href="{% url 'sign-up' %}" class="signup-btn">Sign up</a></span>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="{% static 'auth/js/jquery-3.5.1.min.js' %}"></script>
    <script src="{% static 'auth/js/particles.min.js' %}"></script>
    <script src="{% static 'auth/js/app.js' %}"></script>
    <script src="{% static 'auth/js/script.js' %}"></script>
</body>
</html>
