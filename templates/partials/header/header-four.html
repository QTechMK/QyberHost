    {% load static %}
    <!-- HEADER AREA -->
    <header class="rts-header style-six header__default">
        <div style="background:#000; color:#fff;">
            <div class="container">
                <div class="d-flex align-items-center justify-content-between py-2" style="font-size:14px;">
                    <div class="d-flex align-items-center gap-2">
                        <i class="fa-solid fa-certificate"></i>
                        <span>ISO 27001 - ISO 9001 Certified</span>
                    </div>
                    <div class="d-flex align-items-center gap-4 flex-wrap justify-content-end">
                        <a href="{% url 'contact' %}" class="text-white d-flex align-items-center gap-1">
                            <i class="fa-solid fa-briefcase"></i>
                            <span>Kariyer Fırsatı!</span>
                        </a>
                        <a href="{% url 'blog' %}" class="text-white d-flex align-items-center gap-1">
                            <i class="fa-solid fa-newspaper"></i>
                            <span>Blog</span>
                        </a>
                        <a href="tel:+908508852552" class="text-white d-flex align-items-center gap-1">
                            <i class="fa-solid fa-phone"></i>
                            <span>0 850 885 2552</span>
                        </a>
                        <a href="{% url 'support' %}" class="text-white d-flex align-items-center gap-1">
                            <i class="fa-solid fa-headset"></i>
                            <span>Destek Merkezi</span>
                        </a>
                        <a href="{% url 'sign-in' %}" class="text-white d-flex align-items-center gap-1">
                            <i class="fa-regular fa-user"></i>
                            <span>Kullanıcı Girişi</span>
                        </a>
                        <a href="{% url 'sign-up' %}" class="text-white d-flex align-items-center gap-1">
                            <i class="fa-solid fa-user-plus"></i>
                            <span>Kayıt Ol</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="container">
            <div class="row">
                <div class="rts-header__wrapper">
                    <!-- FOR LOGO -->
                    <div class="rts-header__logo">
                        <a href="{% url 'home' %}" class="site-logo">
                            <img src="{% static 'images/logo/logo-5.svg' %}" alt="Hostie">
                        </a>
                    </div>
                    <!-- FOR NAVIGATION MENU -->
                    {% include 'partials/header/nav.html' %}
                    <!-- FOR HEADER RIGHT -->
                    <div class="rts-header__right">
                        <div class="button-area">
                            <a href="#" class="get-started__btn">Get Started</a>

                        </div>
                        <button id="menu-btn" class="mobile__active menu-btn"><i class="fa-sharp fa-solid fa-bars"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- HEADER AREA END -->
