<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QyberHost Email Base Layout</title>
</head>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;padding:32px 16px;">
        <tr>
            <td align="center">
                <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="width:640px;max-width:100%;background:#ffffff;border-radius:12px;overflow:hidden;">
                    <tr>
                        <td style="background:#0f172a;padding:24px 32px;color:#ffffff;">
                            <strong>QyberHost</strong>
                            <div style="font-size:28px;line-height:1.3;margin-top:12px;font-weight:700;">Email Title</div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px;">
                            <p style="margin:0 0 16px 0;">Hello {{ customer_name }},</p>
                            <p style="margin:0 0 16px 0;">Replace this section with the final email body.</p>
                            <p style="margin:0;">You can reuse local assets from the sibling <code>images</code> directory.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
