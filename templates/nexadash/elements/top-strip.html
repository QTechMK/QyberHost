<style>
    .dashboard-top-strip {
        background: #1f355c;
        color: #fff;
        font-size: 12px;
        line-height: 1;
        padding: 8px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.14);
        position: relative;
        z-index: 2;
    }
    .dashboard-top-strip a {
        color: #fff;
        text-decoration: none;
        opacity: 0.94;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }
    .dashboard-top-strip a:hover {
        opacity: 1;
    }
</style>
<div class="dashboard-top-strip d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-2">
        <i class="fa-solid fa-certificate"></i>
        <span>ISO 27001 - ISO 9001 Certified</span>
    </div>
    <div class="d-flex align-items-center gap-3 flex-wrap justify-content-end">
        <a href="{% url 'contact' %}">
            <span>Kariyer Fırsatı</span>
            <i class="fa-solid fa-briefcase"></i>
        </a>
        <a href="{% url 'knowledgebase' %}">
            <span>Blog</span>
            <i class="fa-solid fa-newspaper"></i>
        </a>
        <a href="tel:+908508852552">
            <span>0 850 885 2552</span>
            <i class="fa-solid fa-phone"></i>
        </a>
        <a href="{% url 'support' %}">
            <span>Destek Merkezi</span>
            <i class="fa-solid fa-headset"></i>
        </a>
        {% if request.user.is_authenticated %}
            <a href="{% url 'account_logout' %}">
                <span>Hoş Geldiniz {{ request.user.first_name|default:request.user.username }} {{ request.user.last_name }}</span>
                <i class="fa-solid fa-right-from-bracket"></i>
            </a>
        {% else %}
            <a href="{% url 'sign-in' %}">
                <span>Kullanıcı Girişi</span>
                <i class="fa-regular fa-user"></i>
            </a>
            <a href="{% url 'sign-up' %}">
                <span>Kayıt Ol</span>
                <i class="fa-solid fa-user-plus"></i>
            </a>
        {% endif %}
    </div>
</div>
