{% extends 'nexadash/elements/layouts/admin.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row g-3 align-items-stretch">
        <div class="col-xl-3 d-flex">
            <div class="card h-100 w-100">
                <div class="card-header">
                    <h4 class="card-title mb-0">Hesabiniz</h4>
                </div>
                <div class="list-group list-group-flush">
                    <a href="{% url 'nexadash:account-overview' %}" class="list-group-item list-group-item-action active">Hesabiniz</a>
                    <a href="{% url 'nexadash:account-select' %}" class="list-group-item list-group-item-action">Farkli Hesaba Gec</a>
                    <a href="{% url 'nexadash:account-change-password' %}" class="list-group-item list-group-item-action">Sifre Degistir</a>
                    <a href="{% url 'nexadash:account-login-security' %}" class="list-group-item list-group-item-action">Guvenlik ve Giris Ayarlari</a>
                    <a href="{% url 'account_logout' %}" class="list-group-item list-group-item-action">Oturumu Kapat</a>
                </div>
            </div>
        </div>

        <div class="col-xl-9 d-flex">
            <div class="card h-100 w-100 account-compact-card">
                <div class="card-body py-3 d-flex flex-column">
                    <h2 class="h5 mb-2">Bilgiler</h2>

                    <form action="javascript:void(0);" method="post" class="d-flex flex-column h-100">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label for="inputFirstName" class="form-label">Adi</label>
                                <input
                                    type="text"
                                    id="inputFirstName"
                                    value="{{ profile_data.first_name }}"
                                    class="form-control"
                                    disabled
                                >
                            </div>
                            <div class="col-md-6 mb-2">
                                <label for="inputLastName" class="form-label">Soyadi</label>
                                <input
                                    type="text"
                                    id="inputLastName"
                                    value="{{ profile_data.last_name }}"
                                    class="form-control"
                                    disabled
                                >
                            </div>
                        </div>

                        <h2 class="h5 mb-2 mt-2">Email Adresimi Degistir</h2>
                        <p class="mb-2">
                            <span class="badge badge-success">Onayli Email</span>
                        </p>

                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label for="inputEmail" class="form-label">E-posta</label>
                                <input
                                    type="email"
                                    id="inputEmail"
                                    value="{{ profile_data.email }}"
                                    class="form-control"
                                    disabled
                                >
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-auto">
                            <button class="btn btn-primary" type="button">Degisiklikleri Kaydet</button>
                            <button class="btn btn-light" type="reset">Vazgec</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.account-compact-card .form-control {
    min-height: 38px;
}
</style>
{% endblock %}
